<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="shortcut icon" href="icons8-html-5-64.png" type="image/x-icon">
</head>

<body>
    <form action="">
        <fieldset>
            <legend>Registration</legend>
            <label for="">First Name : </label>
            <input type="text" placeholder="Enter your first name" required><br><br>
            <label for="">Last Name  : </label>
            <input type="text" placeholder="Enter your last name" required><br><br>
            <label for="">Email : </label>
            <input type="email" placeholder="Enter your email" required><br><br>
            <label for="">Age :</label>
            <input type="number" placeholder="Enter your age" required ><br><br>
            <label for="">Birth Date :</label>
            <input type="date" required><br><br>
            <label for="">Gender :</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female <br><br>
            <textarea placeholder="Write something" rows="4" cols="50"></textarea><br><br>
            <label for="">Select a person:</label>
            <select>
                <option value="">Mursalin</option>
                <option value="">Mizan</option>
                <option value="">Saed</option>
            </select><br><br>
            <iframe src="https://www.programming-hero.com/" height="200px"></iframe><br><br>
            <button style="background-color: blue; width:70px">Submit</button>
        </fieldset>
    </form>
</body>
</html>
